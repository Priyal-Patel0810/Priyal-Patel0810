<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&amp;display=swap');
    .title { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 16px; letter-spacing: 0.3em; fill: #8B949E; text-transform: uppercase; }
    .name { font-family: 'Inter', sans-serif; font-weight: 800; font-size: 56px; fill: #FFFFFF; }
    .desc { font-family: 'Inter', sans-serif; font-weight: 400; font-size: 20px; fill: #C9D1D9; }
    .pill-text { font-family: 'Inter', sans-serif; font-weight: 600; font-size: 14px; fill: #FFFFFF; }
    .chart-label { font-family: 'Inter', sans-serif; font-size: 12px; fill: #8B949E; letter-spacing: 0.1em; }
    .fade-in { animation: fadeIn 1.5s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>

  <rect width="1200" height="400" rx="12" fill="#0d1117"/>
  <rect x="0.5" y="0.5" width="1199" height="399" rx="11.5" stroke="#30363d" />

  <g stroke="#30363d" stroke-width="2" fill="none" opacity="0.6">
    <path d="M1000 80C1000 68.9543 1008.95 60 1020 60C1021.31 60 1022.58 60.1265 1023.8 60.3673C1027.65 54.1042 1034.56 50 1042.42 50C1053.88 50 1063.38 58.4239 1064.92 69.4182C1066.55 68.4988 1068.44 68 1070.45 68C1077.94 68 1084 74.0589 1084 81.5455C1084 81.6976 1083.99 81.8485 1083.99 81.9982C1089.76 84.1448 1094 89.6749 1094 96.1818C1094 104.918 1086.92 112 1078.18 112H1020C1008.95 112 1000 103.046 1000 92V80Z" />
    <path d="M1080 130C1080 121.716 1086.72 115 1095 115C1103.28 115 1110 121.716 1110 130V140H1120C1128.28 140 1135 146.716 1135 155C1135 163.284 1128.28 170 1120 170H1090C1084.48 170 1080 165.523 1080 160V130Z" />
  </g>

  <g class="fade-in">
    <text x="80" y="80" class="title">CLOUD • SRE • INFRASTRUCTURE ENGINEERING</text>
    <text x="80" y="150" class="name">PRIYAL PATEL</text>
    <text x="80" y="200" class="desc">Architecting reliable delivery across AWS, GCP, IaC, CI/CD,</text>
    <text x="80" y="230" class="desc">containers, platform automation, and secure cloud operations.</text>

    <g transform="translate(80, 270)">
      <rect width="130" height="32" rx="16" fill="#1f2937" stroke="#374151"/>
      <circle cx="16" cy="16" r="4" fill="#38bdf8"/>
      <text x="32" y="21" class="pill-text">AWS / GCP</text>
      
      <g transform="translate(145, 0)">
        <rect width="130" height="32" rx="16" fill="#1f2937" stroke="#374151"/>
        <circle cx="16" cy="16" r="4" fill="#a855f7"/>
        <text x="32" y="21" class="pill-text">Terraform</text>
      </g>

      <g transform="translate(290, 0)">
        <rect width="150" height="32" rx="16" fill="#1f2937" stroke="#374151"/>
        <circle cx="16" cy="16" r="4" fill="#10b981"/>
        <text x="32" y="21" class="pill-text">CI/CD Pipelines</text>
      </g>

      <g transform="translate(455, 0)">
        <rect width="135" height="32" rx="16" fill="#1f2937" stroke="#374151"/>
        <circle cx="16" cy="16" r="4" fill="#f43f5e"/>
        <text x="32" y="21" class="pill-text">DevSecOps</text>
      </g>
    </g>
  </g>

  <g transform="translate(850, 210)" class="fade-in">
    <text x="0" y="0" class="chart-label" text-anchor="middle">RELIABILITY SIGNALS</text>
    <text x="-90" y="25" class="chart-label" font-size="10">Scalable</text>
    <text x="0" y="25" class="chart-label" font-size="10">Observable</text>
    <text x="90" y="25" class="chart-label" font-size="10">Automated</text>
    
    <path d="M-120 80 Q-90 40 -60 70 T0 50 T60 80 T120 40" stroke="url(#lineGradient)" stroke-width="3" fill="none" />
    <circle cx="-120" cy="80" r="4" fill="#38bdf8" />
    <circle cx="120" cy="40" r="4" fill="#38bdf8" />
    
    <defs>
      <linearGradient id="lineGradient" x1="-120" y1="60" x2="120" y2="60" gradientUnits="userSpaceOnUse">
        <stop stop-color="#38bdf8" />
        <stop offset="1" stop-color="#818cf8" />
      </linearGradient>
    </defs>
  </g>
